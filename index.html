<!DOCTYPE html>
<html lang="hr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAJKA PRO - BALKAN EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Luckiest Guy', cursive; touch-action: manipulation; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        #score-big { font-size: 100px; color: white; text-shadow: 5px 5px #000; z-index: 10; }
        .btn { pointer-events: auto; background: gold; color: black; padding: 20px 40px; border-radius: 50px; font-weight: bold; border: 4px solid white; font-size: 24px; margin: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); z-index: 50; }
        #msg { color: #ff3e3e; font-size: 40px; text-align: center; text-shadow: 3px 3px #fff; padding: 20px; display: none; z-index: 40; }
        #upload-box { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: auto; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; border: 2px solid gold; text-align: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="upload-box">
        <button class="btn" style="padding: 10px 20px; font-size: 14px;" onclick="document.getElementById('upload').click()">UBACI SVOJ LIK</button>
        <input type="file" id="upload" accept="image/*" style="display:none">
    </div>
    <div class="ui">
        <div id="score-big">0</div>
        <div id="msg"></div>
        <div id="buttons" style="display:none; flex-direction: column;">
            <button class="btn" onclick="resetGame()">NOVA IGRA</button>
            <button class="btn" onclick="shareGame()">SHARE LINK 🚀</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const msgDiv = document.getElementById("msg");
    const btnDiv = document.getElementById("buttons");
    const scoreBig = document.getElementById("score-big");
    
    // ZVUKOVI
    const bgm = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
    bgm.loop = true;
    const hitSfx = new Audio("https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3");

    canvas.width = 360; canvas.height = 640;

    let bird = { x: 50, y: 300, vel: 0, grav: 0.25, jump: -5 };
    let pipes = [], score = 0, gameState = "PLAYING", speed = 3, frame = 0, particles = [];
    let bgColors = ["#4ec0ca", "#ff9a9e", "#a18cd1", "#fad0c4", "#ffecd2"];
    let currentColor = bgColors[0];
    let birdImg = new Image();
    birdImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='18' fill='%23FFD700'/%3E%3C/svg%3E";

    const provale = ["Jesi l' to preko štele?", "Srljaš k'o june!", "Drži se mješalice!", "Đe ćeš glavom?!", "Obatali ti ovo!", "Kao da si s brda sišao!"];

    function resetGame() {
        bird = { x: 50, y: 300, vel: 0, grav: 0.25, jump: -5 };
        pipes = []; score = 0; speed = 3; gameState = "PLAYING"; particles = [];
        msgDiv.style.display = "none";
        btnDiv.style.display = "none";
        scoreBig.innerHTML = "0";
        bgm.play();
    }

    function createParticles(x, y) {
        for(let i=0; i<15; i++) {
            particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1.0 });
        }
    }

    function endGame() {
        gameState = "OVER"; hitSfx.play();
        createParticles(bird.x, bird.y);
        msgDiv.style.display = "block";
        btnDiv.style.display = "flex";
        msgDiv.innerHTML = provale[Math.floor(Math.random()*provale.length)];
    }

    function update() {
        if(gameState !== "PLAYING") return;
        bird.vel += bird.grav; bird.y += bird.vel;
        if(frame % 90 === 0) pipes.push({x: 360, h: Math.random()*300+50});
        
        pipes.forEach((p, i) => {
            p.x -= speed;
            if(bird.x+40 > p.x && bird.x < p.x+50 && (bird.y < p.h || bird.y+40 > p.h+160)) endGame();
            if(p.x+50 < bird.x && !p.passed) { 
                score++; p.passed = true; scoreBig.innerHTML = score; speed += 0.02;
                if(score % 5 === 0) currentColor = bgColors[(score/5) % bgColors.length];
            }
        });
        if(bird.y > 640 || bird.y < 0) endGame();
        frame++;
    }

    function draw() {
        ctx.fillStyle = currentColor; ctx.fillRect(0,0,360,640);
        pipes.forEach(p => {
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(p.x, 0, 50, p.h);
            ctx.fillRect(p.x, p.h+160, 50, 640);
        });
        ctx.drawImage(birdImg, bird.x, bird.y, 40, 40);
        particles.forEach(p => {
            ctx.fillStyle = "white"; ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, 5, 5);
            p.x += p.vx; p.y += p.vy; p.life -= 0.05;
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(() => { update(); draw(); });
    }

    window.addEventListener("pointerdown", () => {
        if(gameState === "PLAYING") bird.vel = bird.jump;
    });

    document.getElementById("upload").onchange = (e) => {
        let reader = new FileReader();
        reader.onload = (ev) => { birdImg.src = ev.target.result; };
        reader.readAsDataURL(e.target.files[0]);
    };

    function shareGame() {
        if(navigator.share) navigator.share({title: 'HAJKA PRO', text: 'Igraj i ti!', url: window.location.href});
        else alert("Kopiraj link: " + window.location.href);
    }

    draw();
</script>
</body>
</html>
