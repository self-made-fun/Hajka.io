<!DOCTYPE html>
<html lang="hr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>HAJKA PRO</title>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: #000; display: flex; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw; overflow: hidden; position: fixed; font-family: sans-serif;
        }
        canvas { display: block; max-width: 100%; max-height: 100%; object-fit: contain; }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; align-items: center;
        }

        #score-text { font-size: 80px; font-weight: bold; color: white; text-shadow: 4px 4px #000; margin-top: 50px; }
        #status-text { color: white; text-align: center; text-shadow: 2px 2px #000; font-size: 26px; margin-top: 30%; padding: 0 20px; }

        /* Univerzalno Share Dugme */
        #btn-share {
            position: absolute; bottom: 30px; right: 20px;
            padding: 15px 20px; background: gold; color: black;
            border-radius: 50px; font-weight: bold; pointer-events: auto; 
            border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: none; text-decoration: none; font-size: 16px;
        }

        #upload-box {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0,0,0,0.7); padding: 8px; border-radius: 8px;
            pointer-events: auto; color: white; font-size: 11px; z-index: 100; border: 1px solid #555;
        }
    </style>
</head>
<body>

    <div id="upload-box">
        <input type="file" id="upload" accept="image/*" style="width: 100px;">
        <div style="margin-top:5px; color:gold;">IZBACI LIK</div>
    </div>

    <div class="ui-layer">
        <div id="score-text"></div>
        <div id="status-text">TAPNI ZA START</div>
    </div>

    <div id="btn-share" onclick="nativeShare(event)">PODIJELI HAJKU 🚀</div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const statusText = document.getElementById("status-text");
    const scoreText = document.getElementById("score-text");
    const btnShare = document.getElementById("btn-share");

    canvas.width = 360; canvas.height = 640; 

    const flapSfx = new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");
    const hitSfx = new Audio("https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3");

    let birdImg = new Image();
    birdImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='18' fill='%23FFD700'/%3E%3Ccircle cx='28' cy='15' r='4' fill='white'/%3E%3Cpath d='M25 25 Q35 30 25 30' fill='orange'/%3E%3C/svg%3E";

    const provale = ["E moj majstore...", "Jesi l' to preko veze?", "Srljaš k'o june!", "Obatali ti ovo!", "Đe ćeš glavom!", "Drži se ti mješalice!"];

    let bird, pipes, score, frame, gameState, speed, particles;
    let highScore = localStorage.getItem("flappyBalkanHS") || 0;

    function reset() {
        bird = { x: 60, y: 280, w: 46, h: 46, vel: 0, grav: 0.24, jump: -5.3, rot: 0 };
        pipes = []; score = 0; frame = 0; speed = 3.2; particles = [];
        gameState = "START";
        statusText.innerHTML = "TAPNI ZA START<br><small style='color:gold'>REKORD: "+highScore+"</small>";
        scoreText.innerHTML = "";
        btnShare.style.display = "none";
    }

    function createExplosion(x, y) {
        for(let i=0; i<30; i++) {
            particles.push({
                x: x, y: y, vx: (Math.random()-0.5)*18, vy: (Math.random()-0.5)*18,
                size: Math.random()*12+3, life: 1.0, color: `hsl(${Math.random()*60}, 100%, 50%)`
            });
        }
    }

    function update() {
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });

        if (gameState !== "PLAYING") return;
        
        bird.vel += bird.grav; bird.y += bird.vel;
        bird.rot = Math.min(Math.PI/3, Math.max(-Math.PI/4, bird.vel * 0.12));

        if (frame % 95 === 0) {
            let gap = 160;
            let h = Math.random() * (canvas.height - gap - 200) + 100;
            pipes.push({ x: canvas.width, y: 0, h: h, bY: h + gap, p: false });
        }

        pipes.forEach((p, i) => {
            p.x -= speed;
            if (bird.x + 38 > p.x && bird.x + 8 < p.x + 55 && (bird.y + 8 < p.h || bird.y + 38 > p.bY)) endGame();
            if (p.x + 55 < bird.x && !p.p) { score++; p.p = true; scoreText.innerHTML = score; speed += 0.04; }
            if (p.x < -70) pipes.splice(i, 1);
        });

        if (bird.y > canvas.height || bird.y < 0) endGame();
        frame++;
    }

    function endGame() {
        gameState = "OVER"; hitSfx.play();
        createExplosion(bird.x + 20, bird.y + 20);
        let msg = provale[Math.floor(Math.random()*provale.length)];
        statusText.innerHTML = "<span style='color:red'>"+msg+"</span><br>SCORE: " + score;
        if(score > highScore) {
            highScore = score; localStorage.setItem("flappyBalkanHS", highScore);
            statusText.innerHTML = "<span style='color:gold'>NOVI REKORD!</span><br>" + statusText.innerHTML;
        }
        btnShare.style.display = "block";
    }

    function draw() {
        let h1 = 197; if(score > 10) h1 = 20; if(score > 25) h1 = 260;
        let g = ctx.createLinearGradient(0, 0, 0, canvas.height);
        g.addColorStop(0, `hsl(${h1}, 75%, 50%)`); g.addColorStop(1, "#fff");
        ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, canvas.height);

        pipes.forEach(p => {
            ctx.fillStyle = "#2ecc71"; ctx.fillRect(p.x, 0, 55, p.h); ctx.fillRect(p.x, p.bY, 55, canvas.height);
            ctx.strokeStyle = "#1e8449"; ctx.lineWidth = 4; ctx.strokeRect(p.x, -5, 55, p.h+5); ctx.strokeRect(p.x, p.bY, 55, canvas.height);
        });

        ctx.save();
        ctx.translate(bird.x + 23, bird.y + 23); ctx.rotate(bird.rot);
        ctx.drawImage(birdImg, -23, -23, 46, 46);
        ctx.restore();

        particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); });
        ctx.globalAlpha = 1;
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    function handleInput(e) {
        if (e.target.closest('#upload-box') || e.target.closest('#btn-share')) return;
        if (gameState === "START") { gameState = "PLAYING"; statusText.innerHTML = ""; scoreText.innerHTML = "0"; }
        else if (gameState === "OVER") reset();
        else { bird.vel = bird.jump; flapSfx.currentTime = 0; flapSfx.play(); }
    }

    async function nativeShare(e) {
        e.stopPropagation();
        const shareData = {
            title: 'HAJKA PRO',
            text: `Moj rekord na HAJCI je ${score}! Možeš li bolje?`,
            url: window.location.href
        };
        try {
            if (navigator.share) await navigator.share(shareData);
            else alert("Kopiraj link: " + window.location.href);
        } catch (err) { console.log(err); }
    }

    window.addEventListener("touchstart", handleInput, { passive: false });
    window.addEventListener("mousedown", handleInput);
    document.getElementById("upload").addEventListener("change", (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { birdImg.src = ev.target.result; };
        reader.readAsDataURL(e.target.files[0]);
    });

    reset(); loop();
</script>
</body>
</html>
