<html lang="hr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAJKA PRO</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; object-fit: contain; }

        /* UI Elementi */
        .ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        
        #score-big { font-size: 60px; font-weight: bold; color: white; text-shadow: 2px 2px #000; margin-bottom: 20px; }
        
        /* Dugmad */
        .btn { pointer-events: auto; background: gold; color: black; padding: 15px 30px; border-radius: 50px; font-weight: bold; border: none; font-size: 18px; margin: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #controls { position: absolute; top: 10px; left: 10px; z-index: 100; pointer-events: auto; }
        
        /* Poruka */
        #msg { color: white; font-size: 24px; text-align: center; text-shadow: 2px 2px #000; padding: 20px; display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="controls">
        <input type="file" id="upload" accept="image/*" style="display:none">
        <button class="btn" style="padding: 5px 10px; font-size: 12px;" onclick="document.getElementById('upload').click()">UBACI LIK</button>
    </div>

    <div class="ui">
        <div id="score-big"></div>
        <div id="msg"></div>
        <div id="buttons" style="display:none;">
            <button class="btn" onclick="reset()">NOVA IGRA</button>
            <button class="btn" onclick="shareGame()">SHARE 🚀</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const msgDiv = document.getElementById("msg");
    const btnDiv = document.getElementById("buttons");
    const scoreBig = document.getElementById("score-big");
    
    // Postavi rezoluciju
    canvas.width = 360; canvas.height = 640;

    let birdImg = new Image();
    birdImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='18' fill='%23FFD700'/%3E%3Ccircle cx='28' cy='15' r='4' fill='white'/%3E%3Cpath d='M25 25 Q35 30 25 30' fill='orange'/%3E%3C/svg%3E";

    let bird, pipes, score, gameState, speed;
    let highScore = localStorage.getItem("flappyBalkanHS") || 0;

    function reset() {
        bird = { x: 50, y: 300, vel: 0, grav: 0.25, jump: -5 };
        pipes = []; score = 0; speed = 3; gameState = "PLAYING";
        msgDiv.style.display = "none";
        btnDiv.style.display = "none";
        scoreBig.innerHTML = "0";
    }

    function endGame() {
        gameState = "OVER";
        msgDiv.style.display = "block";
        btnDiv.style.display = "block";
        msgDiv.innerHTML = "KRAJ! Tvoj score: " + score;
        if(score > highScore) { highScore = score; localStorage.setItem("flappyBalkanHS", highScore); }
    }

    function update() {
        if(gameState !== "PLAYING") return;
        bird.vel += bird.grav; bird.y += bird.vel;

        if(frame % 90 === 0) pipes.push({x: 360, h: Math.random()*300+50, passed: false});

        pipes.forEach((p, i) => {
            p.x -= speed;
            if(bird.x+30 > p.x && bird.x < p.x+50 && (bird.y < p.h || bird.y+30 > p.h+150)) endGame();
            if(p.x+50 < bird.x && !p.passed) { score++; p.passed = true; scoreBig.innerHTML = score; }
        });
        if(bird.y > 640 || bird.y < 0) endGame();
        frame++;
    }

    function draw() {
        ctx.fillStyle = "#4ec0ca"; ctx.fillRect(0,0,360,640);
        pipes.forEach(p => {
            ctx.fillStyle = "green"; 
            ctx.fillRect(p.x, 0, 50, p.h);
            ctx.fillRect(p.x, p.h+150, 50, 640);
        });
        ctx.drawImage(birdImg, bird.x, bird.y, 40, 40);
        requestAnimationFrame(() => { update(); draw(); });
    }

    // Inputi
    window.addEventListener("touchstart", () => { if(gameState==="PLAYING") bird.vel = bird.jump; });
    document.getElementById("upload").onchange = function(e) {
        let reader = new FileReader();
        reader.onload = (ev) => { birdImg.src = ev.target.result; };
        reader.readAsDataURL(e.target.files[0]);
    };

    function shareGame() {
        if(navigator.share) navigator.share({title: 'HAJKA', url: window.location.href});
    }

    let frame = 0;
    reset(); draw();
</script>
</body>
</html>
